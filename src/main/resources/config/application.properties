app.env=dev
app.triggerCooldownSeconds=10

# 语言配置：zh（中文）, en（英文）
app.language=zh

paths.modelsDir=models
paths.recordingsDir=recordings
paths.cacheDir=cache

audio.sampleRate=16000
audio.channels=1
audio.bitsPerSample=16
audio.frameMillis=20
audio.lookbackSeconds.default=240

vad.enabled.default=true
vad.quietThresholdSeconds.default=5

ai.timeoutSeconds.default=30
ai.maxRetryCount.default=3
ai.streaming.default=true
ai.provider.default=QIANFAN
ai.modelName.default=

# 语音引擎配置：SHERPA（本地Sherpa-ONNX）, API（云端API）, FAKE（模拟测试）
# - SHERPA: 本地离线识别，需要下载模型文件
# - API: 云端识别，需要配置 API Key，无需本地模型
# - FAKE: 模拟测试模式，用于开发调试
speech.engine.default=API

# API 语音识别配置（当 speech.engine.default=API 时生效）
# 支持 OpenAI Whisper API 或兼容接口（如 Groq、Azure 等）
speech.api.url=https://api.groq.com/openai/v1/audio/transcriptions
speech.api.key=
speech.api.model=whisper-large-v3

# 模型下载配置（当 speech.engine.default=SHERPA 时需要）
model.download.baseUrl=https://github.com/k2-fsa/sherpa-onnx/releases/download
model.download.kwsModel=sherpa-onnx-kws-zipformer-wenetspeech-3.3M-2024-01-01
model.download.asrModel=sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20
model.download.vadModel=silero_vad.onnx
